name: ⚾ MLB Daily Betting Pipeline

on:
  schedule:
    # ── Morning slate: 10:00 AM ET = 14:00 UTC ──────────────────────────────
    - cron: '0 14 * * *'
    # ── Pregame polling: every 30 min, 11 AM → 11 PM ET ─────────────────────
    - cron: '0,30 15-23 * * *'
    # ── Late pregame / overnight: 12 AM – 5 AM ET ───────────────────────────
    - cron: '0,30 0-5 * * *'
    # ── Results check: every 30 min from 10 PM → 2 AM ET ────────────────────
    # 10 PM–11:30 PM ET = 02:00–03:30 UTC next day
    - cron: '0,30 2-6 * * *'

  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'morning'
        type: choice
        options:
          - morning
          - pregame
          - results
          - full
      date:
        description: 'Date override (YYYY-MM-DD) — leave blank for today'
        required: false
        default: ''

jobs:
  run-pipeline:
    name: Run MLB Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set today's date
        id: today
        run: echo "TODAY=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Determine run mode
        run: |
          HOUR=$(TZ=America/New_York date +%H)
          MANUAL="${{ github.event.inputs.mode }}"
          if [ -n "$MANUAL" ]; then
            echo "RUN_MODE=$MANUAL" >> "$GITHUB_ENV"
          elif [ "$HOUR" = "10" ]; then
            echo "RUN_MODE=morning" >> "$GITHUB_ENV"
          elif [ "$HOUR" -ge 22 ] || [ "$HOUR" -lt 6 ]; then
            echo "RUN_MODE=results" >> "$GITHUB_ENV"
          else
            echo "RUN_MODE=pregame" >> "$GITHUB_ENV"
          fi

      - name: Restore picks + pregame state cache
        uses: actions/cache@v4
        with:
          path: |
            sent_pregame.json
            saved_picks.json
          key: mlb-state-${{ env.TODAY }}-${{ github.run_number }}
          restore-keys: |
            mlb-state-${{ env.TODAY }}-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          TARGET_DATE: ${{ github.event.inputs.date }}
          RUN_MODE: ${{ env.RUN_MODE }}
        run: python main.py

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mlb-${{ env.RUN_MODE }}-${{ env.TODAY }}-${{ github.run_number }}
          path: output/
          retention-days: 14
